<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Shoruto Chat</title>

  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #05060C;
      color: #EAF0FF;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ===== ANIMATED GLASS BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle at 20% 30%, rgba(91, 127, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(139, 124, 255, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(91, 127, 255, 0.03) 0%, transparent 70%);
      animation: floatBg 20s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes floatBg {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(2%, 2%) rotate(3deg); }
    }

    /* ===== GLASSMORPHISM CORE ===== */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --glass-blur: blur(16px);
      --blue: #5B7FFF;
      --violet: #8B7CFF;
      --mint: #34D399;
      --text: #EAF0FF;
      --text-dim: #A8B2D9;
      --text-dimmer: #5C6788;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 8px; }

    /* ===== APP LAYOUT ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ===== GLASS HEADER ===== */
    #header {
      padding: 16px 28px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--glass-shadow);
      position: relative;
      z-index: 10;
    }

    /* ---- LOGO ---- */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }
    .logo .mark svg {
      display: block;
      width: 38px;
      height: 38px;
      filter: drop-shadow(0 0 12px rgba(91, 127, 255, 0.2));
    }
    .logo .mark {
      line-height: 0;
    }
    .logo span:last-child {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    #header .room-name {
      font-size: 13px;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      padding: 6px 20px;
      border-radius: 40px;
      border: 1px solid var(--glass-border);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ===== LOGIN FORM (Glass) ===== */
    #name-form {
      position: fixed;
      z-index: 20;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(5, 6, 12, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    #name-form .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 440px;
      width: 90%;
    }

    #name-form .logo-big {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #name-form .logo-big .mark svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 30px rgba(91, 127, 255, 0.2));
    }
    #name-form .logo-big .brand {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    #name-form p {
      color: var(--text-dim);
      font-size: 15px;
      text-align: center;
      line-height: 1.6;
      font-weight: 400;
    }

    #name-input {
      width: 100%;
      padding: 16px 24px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
      text-align: center;
      font-weight: 500;
    }
    #name-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(91, 127, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
    }
    #name-input::placeholder {
      color: var(--text-dimmer);
      font-weight: 400;
    }

    #name-form .join-btn {
      width: 100%;
      padding: 16px;
      border-radius: 40px;
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(91, 127, 255, 0.2);
    }
    #name-form .join-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(91, 127, 255, 0.3);
    }

    /* ===== CHAT WRAPPER ===== */
    #chat-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ===== CHATLOG ===== */
    #chatlog {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    /* ===== GLASS MESSAGES ===== */
    #chatlog .message {
      padding: 14px 22px;
      border-radius: 20px;
      max-width: 75%;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 15px;
      animation: glassIn 0.3s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: all 0.2s;
    }

    #chatlog .message.self {
      background: rgba(91, 127, 255, 0.15);
      border: 1px solid rgba(91, 127, 255, 0.15);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      box-shadow: 0 8px 24px rgba(91, 127, 255, 0.1);
    }

    #chatlog .message.other {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }

    #chatlog .message .username {
      font-weight: 600;
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
      color: var(--violet);
      letter-spacing: 0.2px;
    }
    #chatlog .message.self .username {
      color: rgba(255, 255, 255, 0.6);
    }

    #chatlog .system-msg {
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 12px 0;
      font-style: italic;
      opacity: 0.6;
      letter-spacing: 0.3px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      margin: 0 auto;
      padding: 6px 20px;
    }

    #chatlog .spacer {
      flex: 1;
    }

    @keyframes glassIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ===== ROSTER (Glass) ===== */
    #roster {
      width: 220px;
      padding: 24px 18px;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      overflow-y: auto;
      flex-shrink: 0;
      display: none;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(8px);
    }

    #roster .roster-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-dimmer);
      margin-bottom: 16px;
      font-weight: 600;
    }

    #roster .roster-user {
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 14px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(4px);
      margin-bottom: 4px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    #roster .roster-user:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.05);
    }
    #roster .roster-user .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      display: inline-block;
      box-shadow: 0 0 12px rgba(52, 211, 153, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    @media(min-width: 768px) {
      #roster { display: block; }
    }

    /* ===== INPUT BAR (Glass) ===== */
    #input-bar {
      display: flex;
      gap: 14px;
      padding: 18px 28px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 5;
    }

    #chat-input {
      flex: 1;
      padding: 14px 24px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
      min-width: 0;
    }
    #chat-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(91, 127, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
    }
    #chat-input::placeholder {
      color: var(--text-dimmer);
      font-weight: 400;
    }

    #send-btn {
      padding: 14px 32px;
      border-radius: 40px;
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(91, 127, 255, 0.2);
      letter-spacing: 0.3px;
    }
    #send-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(91, 127, 255, 0.35);
    }
    #send-btn:active {
      transform: scale(0.95);
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media(max-width: 768px) {
      #header { padding: 12px 16px; }
      .logo .mark svg { width: 30px; height: 30px; }
      .logo span:last-child { font-size: 18px; }
      #header .room-name { font-size: 11px; padding: 4px 14px; }

      #input-bar { padding: 12px 14px; gap: 8px; }
      #chat-input { font-size: 15px; padding: 12px 16px; }
      #send-btn { padding: 12px 20px; font-size: 13px; }

      #chatlog { padding: 16px 14px; }
      #chatlog .message { max-width: 90%; font-size: 14px; padding: 10px 16px; }

      #name-form .glass-card { padding: 32px 24px; }
      #name-form .logo-big .mark svg { width: 56px; height: 56px; }
      #name-form .logo-big .brand { font-size: 28px; }

      #roster { width: 140px; padding: 16px 10px; }
      #roster .roster-user { font-size: 12px; padding: 6px 10px; }
    }

    @media(max-width: 400px) {
      #input-bar { padding: 10px 10px; gap: 6px; }
      #chat-input { font-size: 14px; padding: 10px 12px; }
      #send-btn { padding: 10px 16px; font-size: 12px; }
      #chatlog .message { font-size: 13px; }
      #name-form .glass-card { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <!-- ===== LOGIN FORM (Glass) ===== -->
  <form id="name-form">
    <div class="glass-card">
      <div class="logo-big">
        <span class="mark">
          <svg viewBox="0 0 60 60" fill="none" stroke="#5B7FFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="30" cy="28" r="22"/>
            <circle cx="12" cy="10" r="7"/>
            <circle cx="48" cy="10" r="7"/>
            <circle cx="22" cy="25" r="4.5"/>
            <circle cx="22" cy="25" r="1.5" fill="#5B7FFF" fill-opacity="0.6"/>
            <circle cx="38" cy="25" r="4.5"/>
            <circle cx="38" cy="25" r="1.5" fill="#5B7FFF" fill-opacity="0.6"/>
            <path d="M27 33 L30 37 L33 33"/>
            <path d="M26 38 Q30 43 34 38"/>
            <path d="M14 32 L16 35" stroke-dasharray="2 2" opacity="0.5"/>
            <path d="M46 32 L44 35" stroke-dasharray="2 2" opacity="0.5"/>
          </svg>
        </span>
        <span class="brand">Shoruto</span>
      </div>
      <p>Enter your name to join the conversation</p>
      <input id="name-input" placeholder="Your name" autofocus />
      <button type="submit" class="join-btn">Join Chat</button>
    </div>
  </form>

  <!-- ===== MAIN APP ===== -->
  <div id="app" style="display:none;">

    <!-- Header with custom logo -->
    <div id="header">
      <a href="#" class="logo">
        <span class="mark">
          <svg viewBox="0 0 60 60" fill="none" stroke="#5B7FFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="30" cy="28" r="22"/>
            <circle cx="12" cy="10" r="7"/>
            <circle cx="48" cy="10" r="7"/>
            <circle cx="22" cy="25" r="4.5"/>
            <circle cx="22" cy="25" r="1.5" fill="#5B7FFF" fill-opacity="0.6"/>
            <circle cx="38" cy="25" r="4.5"/>
            <circle cx="38" cy="25" r="1.5" fill="#5B7FFF" fill-opacity="0.6"/>
            <path d="M27 33 L30 37 L33 33"/>
            <path d="M26 38 Q30 43 34 38"/>
            <path d="M14 32 L16 35" stroke-dasharray="2 2" opacity="0.5"/>
            <path d="M46 32 L44 35" stroke-dasharray="2 2" opacity="0.5"/>
          </svg>
        </span>
        <span>Shoruto</span>
      </a>
      <span class="room-name" id="room-display">#main</span>
    </div>

    <!-- Chat + Roster -->
    <div id="chat-wrapper">
      <div id="chatlog">
        <div class="spacer"></div>
      </div>
      <div id="roster">
        <div class="roster-title">👥 Online</div>
        <div id="roster-list"></div>
      </div>
    </div>

    <!-- Input -->
    <div id="input-bar">
      <input id="chat-input" placeholder="Type a message..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- JAVASCRIPT (unchanged logic) -->
  <script>
    // --- DOM refs ---
    const nameForm = document.getElementById('name-form');
    const nameInput = document.getElementById('name-input');
    const app = document.getElementById('app');
    const chatlog = document.getElementById('chatlog');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const rosterList = document.getElementById('roster-list');
    const roomDisplay = document.getElementById('room-display');

    let username = '';
    let roomname = 'main';
    let currentWebSocket = null;
    let isAtBottom = true;
    const hostname = window.location.host || 'edge-chat-demo.abhu001987.workers.dev';

    // --- Name submit ---
    nameForm.addEventListener('submit', e => {
      e.preventDefault();
      username = nameInput.value.trim();
      if (username.length > 0 && username.length <= 32) {
        nameForm.style.display = 'none';
        app.style.display = 'flex';
        startChat();
      }
    });

    // --- Send message ---
    function sendMessage() {
      const text = chatInput.value.trim();
      if (text && currentWebSocket) {
        currentWebSocket.send(JSON.stringify({ message: text }));
        chatInput.value = '';
        chatInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // --- Scroll detection ---
    chatlog.addEventListener('scroll', () => {
      isAtBottom = chatlog.scrollTop + chatlog.clientHeight >= chatlog.scrollHeight - 10;
    });

    // --- Add message to UI ---
    function addMessage(name, text, isSelf = false) {
      const p = document.createElement('div');
      p.className = `message ${isSelf ? 'self' : 'other'}`;
      if (name && !isSelf) {
        const span = document.createElement('span');
        span.className = 'username';
        span.textContent = name;
        p.appendChild(span);
      }
      const textNode = document.createTextNode(text);
      p.appendChild(textNode);
      chatlog.appendChild(p);
      if (isAtBottom) chatlog.scrollTop = chatlog.scrollHeight;
    }

    function addSystem(text) {
      const p = document.createElement('div');
      p.className = 'system-msg';
      p.textContent = text;
      chatlog.appendChild(p);
      if (isAtBottom) chatlog.scrollTop = chatlog.scrollHeight;
    }

    function updateRoster(users) {
      rosterList.innerHTML = '';
      users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'roster-user';
        div.innerHTML = `<span class="dot"></span> ${u}`;
        rosterList.appendChild(div);
      });
    }

    // --- WebSocket ---
    function startChat() {
      roomDisplay.textContent = `#${roomname}`;

      const wss = document.location.protocol === 'http:' ? 'ws://' : 'wss://';
      const ws = new WebSocket(`${wss}${hostname}/api/room/${roomname}/websocket`);
      currentWebSocket = ws;

      ws.addEventListener('open', () => {
        ws.send(JSON.stringify({ name: username }));
        addSystem('Connected to chat');
      });

      ws.addEventListener('message', e => {
        const data = JSON.parse(e.data);
        if (data.error) {
          addSystem('⚠️ ' + data.error);
        } else if (data.joined) {
          addSystem(`👤 ${data.joined} joined`);
          const users = [...rosterList.children].map(c => c.textContent);
          updateRoster([...users, data.joined]);
        } else if (data.quit) {
          addSystem(`👤 ${data.quit} left`);
          const users = [...rosterList.children].map(c => c.textContent.replace('● ', ''));
          updateRoster(users.filter(u => u !== data.quit));
        } else if (data.ready) {
          addSystem('✨ Welcome! Say hi to everyone.');
        } else if (data.name && data.message) {
          const isSelf = data.name === username;
          addMessage(data.name, data.message, isSelf);
        }
      });

      ws.addEventListener('close', () => {
        addSystem('⚠️ Disconnected. Reconnecting...');
        setTimeout(startChat, 3000);
      });

      ws.addEventListener('error', () => {
        addSystem('⚠️ Connection error. Reconnecting...');
        ws.close();
      });
    }
  </script>
</body>
</html>
