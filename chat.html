<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Chat · Shoruto</title>

  <!-- Theme: set instantly, before any CSS loads -->
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="..." rel="stylesheet" />

  <!-- Shared CSS & JS (theme) -->
  <link rel="stylesheet" href="theme.css" />
  <script src="theme.js"></script>

  <style>
    /* ===== RESET ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-0);
      background-image:
        radial-gradient(circle at 15% 0%, var(--glow-1), transparent 45%),
        radial-gradient(circle at 85% 20%, var(--glow-2), transparent 40%);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      position: relative;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* Page-local tokens */
    :root {
      --radius-lg: 22px;
      --ease: cubic-bezier(.4, 0, .2, 1);
    }

    /* ===== AMBIENT GLASS BACKGROUND ===== */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
      transition: background 0.4s ease;
    }
    .bg-blob.b1 {
      width: 480px; height: 480px;
      top: -160px; left: -120px;
      background: radial-gradient(circle, var(--glow-1), transparent 70%);
      animation: drift1 22s ease-in-out infinite;
    }
    .bg-blob.b2 {
      width: 420px; height: 420px;
      bottom: -140px; right: -100px;
      background: radial-gradient(circle, var(--glow-2), transparent 70%);
      animation: drift2 26s ease-in-out infinite;
    }
    @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px, 30px); } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px, -40px); } }

    /* ===== LOGO ===== */
    .logo { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo .mark {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--blue-soft);
      flex-shrink: 0;
      transition: background 0.3s ease;
    }
    .logo .mark svg { width: 20px; height: 20px; stroke: var(--blue); }
    .logo .mark svg [fill]:not([fill="none"]) { fill: var(--blue); }
    .logo .word {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: 0.2px;
      transition: color 0.3s ease;
    }
    .logo.lg .mark { width: 56px; height: 56px; border-radius: 16px; }
    .logo.lg .mark svg { width: 32px; height: 32px; }
    .logo.lg .word { font-size: 30px; }

    .ic { width: 1em; height: 1em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vertical-align: -0.14em; flex-shrink: 0; }

    /* ===== LAYOUT ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ============================================ */
    /* HEADER - Only Round Logo + Theme Toggle     */
    /* ============================================ */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 14px 30px;
      background: var(--panel);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s ease, border-color 0.3s ease;
      width: 100%;
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    /* LOGO - Only round icon, no text */
    .logo-link {
      display: flex;
      align-items: center;
      gap: 0;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-link .mark {
      display: inline-flex;
      width: 40px;
      height: 40px;
    }

    .logo-link .mark svg {
      width: 100%;
      height: 100%;
    }

    .logo-link .logo-text {
      display: none;
    }

    .nav-links {
      display: none;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .room-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-dim);
      background: var(--panel-strong);
      padding: 6px 14px 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      margin-right: 10px;
    }
    .room-badge .ic { color: var(--violet); width: 13px; height: 13px; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600;
      color: var(--mint);
    }
    .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 8px var(--mint); animation: floatDot 1.6s ease-in-out infinite; }
    @keyframes floatDot { 0%,100% { opacity: 0.5; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.15); } }

    /* ============================================ */
    /* THEME TOGGLE BUTTON                         */
    /* ============================================ */
    .theme-toggle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      position: relative;
    }

    .theme-toggle:hover {
      background: var(--panel);
      border-color: var(--blue);
      transform: scale(1.06);
    }

    .theme-toggle .sun-icon,
    .theme-toggle .moon-icon {
      position: absolute;
      transition: all 0.45s ease;
    }

    .theme-toggle .sun-icon {
      opacity: 0;
      transform: rotate(-90deg) scale(0.4);
      color: var(--amber);
    }

    .theme-toggle .moon-icon {
      opacity: 1;
      transform: rotate(0) scale(1);
      color: var(--blue);
    }

    [data-theme="light"] .theme-toggle .sun-icon {
      opacity: 1;
      transform: rotate(0) scale(1);
    }

    [data-theme="light"] .theme-toggle .moon-icon {
      opacity: 0;
      transform: rotate(90deg) scale(0.4);
    }

    /* ===== NAME FORM (Login) ===== */
    #name-form {
      position: fixed;
      z-index: 10;
      inset: 0;
      background: var(--bg-0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px;
      text-align: center;
      transition: background 0.3s ease;
    }
    .login-card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--card-shadow);
      max-width: 420px;
      width: 100%;
      animation: cardIn 0.5s var(--ease) both;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    #name-form p {
      color: var(--text-dim);
      font-size: 14.5px;
      line-height: 1.6;
      max-width: 320px;
      transition: color 0.3s ease;
    }
    .name-input-wrap { position: relative; width: 100%; }
    .name-input-wrap .ic {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: var(--text-dimmer); width: 17px; height: 17px;
      transition: color 0.3s ease;
    }
    #name-input {
      width: 100%;
      padding: 14px 20px 14px 46px;
      border-radius: 40px;
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 15.5px;
      outline: none;
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease), background 0.3s ease, color 0.3s ease;
    }
    #name-input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-soft); }
    #name-input::placeholder { color: var(--text-dimmer); }
    .join-btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 40px;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 14.5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: transform 0.15s var(--ease), box-shadow 0.25s var(--ease), filter 0.2s, background 0.3s ease;
      box-shadow: 0 4px 20px var(--blue-soft);
    }
    .join-btn:hover { filter: brightness(1.07); box-shadow: 0 6px 26px var(--blue-soft); }
    .join-btn:active { transform: scale(0.97); }
    .join-btn .ic { transition: transform 0.2s var(--ease); }
    .join-btn:hover .ic { transform: translateX(3px); }

    /* ===== CHAT AREA ===== */
    #chat-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
      margin-top: 72px;
    }

    #chatlog {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .msg-row { display: flex; align-items: flex-end; gap: 9px; max-width: 78%; margin: 3px 0; }
    .msg-row.self { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.other { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 12.5px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #chatlog .bubble-col { display: flex; flex-direction: column; min-width: 0; }
    #chatlog .message {
      padding: 10px 15px;
      border-radius: 16px;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14.5px;
      animation: msgIn 0.25s var(--ease);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid transparent;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .msg-row.self .message {
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg-row.other .message {
      background: var(--panel-strong);
      border-color: var(--border);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }
    .msg-row.other .username {
      font-weight: 700;
      font-size: 12px;
      display: block;
      margin: 0 2px 4px;
      color: var(--violet);
    }

    .system-msg {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      align-self: center;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      padding: 6px 14px;
      margin: 8px 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      animation: msgIn 0.25s var(--ease);
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    .system-msg .ic { width: 12px; height: 12px; color: var(--text-dimmer); }
    .system-msg.warn .ic { color: var(--amber); }
    .system-msg.join .ic { color: var(--mint); }
    .system-msg.leave .ic { color: var(--text-dimmer); }
    .system-msg.welcome .ic { color: var(--violet); }
    .system-msg.connect .ic { color: var(--mint); }

    #chatlog .spacer { flex: 1; }

    /* ===== ROSTER (User List) ===== */
    #roster {
      width: 210px;
      padding: 18px 16px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      display: none;
      background: var(--panel);
      backdrop-filter: blur(14px);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    #roster .roster-title {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dimmer);
      margin-bottom: 14px;
      transition: color 0.3s ease;
    }
    #roster .roster-title .ic { color: var(--blue); }
    #roster .roster-user {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13.5px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 9px;
      transition: background 0.2s var(--ease), color 0.3s ease;
      margin-bottom: 2px;
    }
    #roster .roster-user:hover { background: var(--panel-strong); }
    #roster .roster-user .mini-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: #fff;
      flex-shrink: 0;
    }
    #roster .roster-user .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--mint);
      display: inline-block;
      margin-left: auto;
      box-shadow: 0 0 6px var(--mint);
      flex-shrink: 0;
    }

    @media(min-width: 768px) {
      #roster { display: block; }
    }

    /* ===== INPUT BAR ===== */
    #input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: var(--nav-bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: sticky;
      bottom: 0;
      z-index: 5;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    #chat-input {
      flex: 1;
      padding: 13px 20px;
      border-radius: 40px;
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 15.5px;
      outline: none;
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease), background 0.3s ease, color 0.3s ease;
      min-width: 0;
    }
    #chat-input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-soft); }
    #chat-input::placeholder { color: var(--text-dimmer); }
    #send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s var(--ease), box-shadow 0.3s var(--ease), filter 0.2s, background 0.3s ease;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px var(--blue-soft);
    }
    #send-btn .ic { width: 19px; height: 19px; margin-left: -1px; transition: transform 0.2s var(--ease); }
    #send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 22px var(--blue-soft);
    }
    #send-btn:hover .ic { transform: translateX(2px) translateY(-1px); }
    #send-btn:active {
      transform: scale(0.94);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-dimmer); border-radius: 4px; transition: background 0.3s ease; }

    /* ===== MOBILE FIXES ===== */
    @media(max-width: 768px) {
      .bg-blob { display: none; }
      #input-bar { padding: 10px 12px; gap: 8px; }
      #chat-input { font-size: 16px; padding: 11px 16px; }
      #send-btn { width: 42px; height: 42px; }
      .logo-link .mark { width: 32px; height: 32px; }
      .nav { padding: 10px 16px; }
      .theme-toggle { width: 36px; height: 36px; font-size: 15px; }
      .room-badge { font-size: 11px; padding: 4px 10px; }
      .status-pill { display: none; }
      .msg-row { max-width: 90%; }
      #chatlog .message { font-size: 14px; padding: 9px 13px; }
      .login-card { padding: 32px 24px; }
      .logo.lg .word { font-size: 24px; }
      .logo.lg .mark { width: 46px; height: 46px; }
      .logo.lg .mark svg { width: 26px; height: 26px; }
      #name-form p { font-size: 13px; }
      #roster { width: 150px; padding: 12px 10px; }
      #roster .roster-user { font-size: 12px; padding: 6px 7px; }
      #chat-wrapper { margin-top: 64px; }
    }

    @media(max-width: 400px) {
      #input-bar { padding: 8px 8px; gap: 6px; }
      #chat-input { font-size: 14px; padding: 9px 14px; }
      #send-btn { width: 38px; height: 38px; }
    }
  </style>
</head>

<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>

  <!-- ============================================ -->
  <!-- HEADER - Only Round Logo + Theme Toggle     -->
  <!-- ============================================ -->
  <nav class="nav">
    <div class="nav-inner">
      <!-- LOGO - Only round icon, no text -->
      <a href="index.html" class="logo-link">
        <span class="mark">
          <svg viewBox="0 0 60 60" fill="none" stroke="#5B7FFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="30" cy="28" r="22"/>
            <circle cx="12" cy="10" r="7"/>
            <circle cx="48" cy="10" r="7"/>
            <circle cx="22" cy="25" r="4.5"/>
            <circle cx="22" cy="25" r="1.5" fill="#5B7FFF" fill-opacity="0.6"/>
            <circle cx="38" cy="25" r="4.5"/>
            <circle cx="38" cy="25" r="1.5" fill="#5B7FFF" fill-opacity="0.6"/>
            <path d="M27 33 L30 37 L33 33"/>
            <path d="M26 38 Q30 43 34 38"/>
            <path d="M14 32 L16 35" stroke-dasharray="2 2" opacity="0.5"/>
            <path d="M46 32 L44 35" stroke-dasharray="2 2" opacity="0.5"/>
          </svg>
        </span>
        <span class="logo-text">Shoruto</span>
      </a>

      <div style="display:flex;align-items:center;">
        <span class="room-badge" id="room-display">
          <svg class="ic" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          main
        </span>
        <span class="status-pill"><span class="dot"></span>Live</span>
      </div>

      <!-- ============================================ -->
      <!-- THEME TOGGLE BUTTON                         -->
      <!-- ============================================ -->
      <div class="nav-cta">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="sun-icon">☀️</span>
          <span class="moon-icon">🌙</span>
        </button>
      </div>
      <!-- ============================================ -->
    </div>
  </nav>
  <!-- ============================================ -->

  <!-- ===== LOGIN FORM ===== -->
  <form id="name-form">
    <div class="login-card">
      <span class="logo lg">
        <span class="mark">
          <svg viewBox="0 0 60 60" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="30" cy="28" r="22"/>
            <circle cx="12" cy="10" r="7"/>
            <circle cx="48" cy="10" r="7"/>
            <circle cx="22" cy="25" r="4.5"/>
            <circle cx="22" cy="25" r="1.5" fill="currentColor" fill-opacity="0.6"/>
            <circle cx="38" cy="25" r="4.5"/>
            <circle cx="38" cy="25" r="1.5" fill="currentColor" fill-opacity="0.6"/>
            <path d="M27 33 L30 37 L33 33"/>
            <path d="M26 38 Q30 43 34 38"/>
            <path d="M14 32 L16 35" stroke-dasharray="2 2" opacity="0.5"/>
            <path d="M46 32 L44 35" stroke-dasharray="2 2" opacity="0.5"/>
          </svg>
        </span>
        <span class="word">Shoruto</span>
      </span>
      <p>Enter your name to join the conversation</p>
      <div class="name-input-wrap">
        <svg class="ic" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input id="name-input" placeholder="Your name" autofocus autocomplete="off" />
      </div>
      <button type="submit" class="join-btn" style="display:none;" id="hidden-submit"></button>
      <button type="submit" class="join-btn">Join chat <svg class="ic" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></button>
    </div>
  </form>

  <!-- ===== MAIN APP ===== -->
  <div id="app" style="display:none;">
    <!-- Chat + Roster -->
    <div id="chat-wrapper">
      <div id="chatlog">
        <div class="spacer"></div>
      </div>
      <div id="roster">
        <div class="roster-title"><svg class="ic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Online</div>
        <div id="roster-list"></div>
      </div>
    </div>

    <!-- Input -->
    <div id="input-bar">
      <input id="chat-input" placeholder="Type a message..." autocomplete="off" />
      <button id="send-btn" aria-label="Send"><svg class="ic" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- THEME TOGGLE SCRIPT                         -->
  <!-- ============================================ -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const themeToggle = document.getElementById('themeToggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
      }
    });
  </script>
  <!-- ============================================ -->

  <script>
    // --- DOM refs ---
    const nameForm = document.getElementById('name-form');
    const nameInput = document.getElementById('name-input');
    const app = document.getElementById('app');
    const chatlog = document.getElementById('chatlog');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const rosterList = document.getElementById('roster-list');
    const roomDisplay = document.getElementById('room-display');

    let username = '';
    let roomname = 'main';
    let currentWebSocket = null;
    let isAtBottom = true;
    const hostname = window.location.host || 'edge-chat-demo.abhu001987.workers.dev';

    // --- Name submit ---
    nameForm.addEventListener('submit', e => {
      e.preventDefault();
      username = nameInput.value.trim();
      if (username.length > 0 && username.length <= 32) {
        nameForm.style.display = 'none';
        app.style.display = 'flex';
        startChat();
      }
    });

    // --- Send message ---
    function sendMessage() {
      const text = chatInput.value.trim();
      if (text && currentWebSocket) {
        currentWebSocket.send(JSON.stringify({ message: text }));
        chatInput.value = '';
        chatInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // --- Scroll detection ---
    chatlog.addEventListener('scroll', () => {
      isAtBottom = chatlog.scrollTop + chatlog.clientHeight >= chatlog.scrollHeight - 10;
    });

    // --- Avatar color helper ---
    const AVATAR_PALETTE = ['#3E7BFA', '#8B7CFF', '#34D399', '#FFB84D', '#FF7A9C', '#4FD1E8'];
    function avatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return AVATAR_PALETTE[Math.abs(hash) % AVATAR_PALETTE.length];
    }
    function initials(name) {
      return (name || '?').trim().slice(0, 2).toUpperCase();
    }

    // --- Add message to UI ---
    function addMessage(name, text, isSelf = false) {
      const row = document.createElement('div');
      row.className = `msg-row ${isSelf ? 'self' : 'other'}`;

      if (!isSelf) {
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.style.background = avatarColor(name || '?');
        avatar.textContent = initials(name);
        row.appendChild(avatar);
      }

      const col = document.createElement('div');
      col.className = 'bubble-col';

      const p = document.createElement('div');
      p.className = 'message';
      if (name && !isSelf) {
        const span = document.createElement('span');
        span.className = 'username';
        span.textContent = name;
        col.appendChild(span);
      }
      const textNode = document.createTextNode(text);
      p.appendChild(textNode);
      col.appendChild(p);
      row.appendChild(col);

      chatlog.appendChild(row);
      if (isAtBottom) chatlog.scrollTop = chatlog.scrollHeight;
    }

    function addSystem(text) {
      let clean = text.replace(/^[⚠️👤✨\s]+/u, '').trim();
      let type = 'info';
      let icon = '<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="8.01"/></svg>';

      if (text.includes('⚠️')) {
        type = 'warn';
        icon = '<svg class="ic" viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17.01"/></svg>';
      } else if (clean.includes('joined')) {
        type = 'join';
        icon = '<svg class="ic" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/></svg>';
      } else if (clean.includes('left')) {
        type = 'leave';
        icon = '<svg class="ic" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="17" y1="11" x2="23" y2="11"/></svg>';
      } else if (text.includes('✨') || clean.toLowerCase().includes('welcome')) {
        type = 'welcome';
        icon = '<svg class="ic" viewBox="0 0 24 24"><path d="M12 3l1.9 5.8L20 11l-6.1 2.2L12 19l-1.9-5.8L4 11l6.1-2.2L12 3z"/></svg>';
      } else if (clean.toLowerCase().includes('connected') && !clean.toLowerCase().includes('disconnected')) {
        type = 'connect';
        icon = '<svg class="ic" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12" y2="20"/></svg>';
      }

      const p = document.createElement('div');
      p.className = `system-msg ${type}`;
      p.innerHTML = `${icon}<span></span>`;
      p.querySelector('span').textContent = clean;
      chatlog.appendChild(p);
      if (isAtBottom) chatlog.scrollTop = chatlog.scrollHeight;
    }

    function updateRoster(users) {
      rosterList.innerHTML = '';
      users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'roster-user';
        const av = document.createElement('span');
        av.className = 'mini-avatar';
        av.style.background = avatarColor(u);
        av.textContent = initials(u);
        div.appendChild(av);
        const name = document.createElement('span');
        name.textContent = u;
        div.appendChild(name);
        const dot = document.createElement('span');
        dot.className = 'dot';
        div.appendChild(dot);
        rosterList.appendChild(div);
      });
    }

    // --- WebSocket ---
    function startChat() {
      const roomLabel = roomDisplay.childNodes[roomDisplay.childNodes.length - 1];
      if (roomLabel && roomLabel.nodeType === Node.TEXT_NODE) {
        roomLabel.textContent = roomname;
      } else {
        roomDisplay.appendChild(document.createTextNode(roomname));
      }

      const wss = document.location.protocol === 'http:' ? 'ws://' : 'wss://';
      const ws = new WebSocket(`${wss}${hostname}/api/room/${roomname}/websocket`);
      currentWebSocket = ws;

      ws.addEventListener('open', () => {
        ws.send(JSON.stringify({ name: username }));
        addSystem('Connected to chat');
      });

      ws.addEventListener('message', e => {
        const data = JSON.parse(e.data);
        if (data.error) {
          addSystem('⚠️ ' + data.error);
        } else if (data.joined) {
          addSystem(`👤 ${data.joined} joined`);
          const users = [...rosterList.children].map(c => c.querySelector('span:not(.mini-avatar)').textContent);
          updateRoster([...users, data.joined]);
        } else if (data.quit) {
          addSystem(`👤 ${data.quit} left`);
          const users = [...rosterList.children].map(c => c.querySelector('span:not(.mini-avatar)').textContent);
          updateRoster(users.filter(u => u !== data.quit));
        } else if (data.ready) {
          addSystem('✨ Welcome! Say hi to everyone.');
        } else if (data.name && data.message) {
          const isSelf = data.name === username;
          addMessage(data.name, data.message, isSelf);
        }
      });

      ws.addEventListener('close', () => {
        addSystem('⚠️ Disconnected. Reconnecting...');
        setTimeout(startChat, 3000);
      });

      ws.addEventListener('error', () => {
        addSystem('⚠️ Connection error. Reconnecting...');
        ws.close();
      });
    }

    // --- Set initial theme ---
    const theme = localStorage.getItem('shoruto-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    console.log('🎨 Chat theme set to:', theme);
  </script>
</body>
</html>
