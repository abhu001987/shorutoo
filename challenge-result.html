<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Result - Shoruto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-0, #05060C);
            color: var(--text, #EAF0FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        :root {
            --bg-0: #05060C;
            --panel: rgba(255,255,255,0.045);
            --border: rgba(255,255,255,0.09);
            --blue: #3E7BFA;
            --blue-soft: rgba(62,123,250,0.35);
            --text: #EAF0FF;
            --text-dim: #8993B8;
            --text-dimmer: #5C6788;
            --input-bg: rgba(255,255,255,0.04);
            --mint: #34D399;
            --amber: #FFB84D;
        }
        [data-theme="light"] {
            --bg-0: #F0F4F8;
            --panel: rgba(255,255,255,0.7);
            --border: rgba(0,0,0,0.08);
            --blue: #5B7FFF;
            --blue-soft: rgba(91,127,255,0.12);
            --text: #0F172A;
            --text-dim: #475569;
            --text-dimmer: #94A3B8;
            --input-bg: rgba(0,0,0,0.04);
        }
        [data-theme="light"] body {
            background: linear-gradient(135deg, #D6E4FF 0%, #E8D5FF 40%, #D5F5E3 100%);
        }

        .result-box {
            max-width: 480px;
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }

        .vs-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .vs-battle {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: center;
            margin-bottom: 20px;
        }

        .player-card {
            background: var(--input-bg);
            border-radius: 16px;
            padding: 20px 16px;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }
        .player-card.winner {
            border-color: var(--amber);
            background: rgba(255, 184, 77, 0.08);
        }
        .player-card .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .player-card .avatar.you { background: linear-gradient(135deg, #5B7FFF, #A78BFA); }
        .player-card .avatar.friend { background: linear-gradient(135deg, #34D399, #5B7FFF); }
        .player-card .name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .player-card .name .tag {
            font-size: 11px;
            color: var(--text-dimmer);
            font-weight: 400;
        }
        .player-card .score {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
        }
        .player-card .score-label {
            font-size: 12px;
            color: var(--text-dim);
        }
        .player-card .trophy {
            font-size: 24px;
            margin-top: 4px;
            display: block;
        }

        .vs-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dimmer);
        }

        .joke-box {
            background: var(--blue-soft);
            border-radius: 14px;
            padding: 16px 20px;
            margin: 16px 0 24px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .joke-box .joke-emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
        .joke-box .joke-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.5;
        }
        .joke-box .joke-text .highlight {
            color: var(--amber);
            font-weight: 700;
        }

        .btn-rematch {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #5B7FFF, #A78BFA);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn-rematch:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(91, 127, 255, 0.35);
        }

        .btn-home {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-dim);
        }
        .btn-home:hover {
            background: var(--input-bg);
            color: var(--text);
        }

        @media (max-width: 480px) {
            .result-box { padding: 24px 16px; }
            .vs-battle { grid-template-columns: 1fr; gap: 12px; }
            .vs-text { display: none; }
            .player-card .score { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="result-box">
    <div class="vs-title">⚔️ Challenge Results</div>

    <div class="vs-battle">
        <!-- You -->
        <div class="player-card winner" id="youCard">
            <div class="avatar you">Y</div>
            <div class="name">
                You <span class="tag">(Challenger)</span>
            </div>
            <div class="score" id="yourScore">82%</div>
            <div class="score-label">Your Score</div>
            <span class="trophy">🏆</span>
        </div>

        <div class="vs-text">VS</div>

        <!-- Friend -->
        <div class="player-card" id="friendCard">
            <div class="avatar friend">R</div>
            <div class="name">
                <span id="friendName">Rahul</span> <span class="tag">(Friend)</span>
            </div>
            <div class="score" id="friendScore">71%</div>
            <div class="score-label">Their Score</div>
            <span class="trophy" id="friendTrophy"></span>
        </div>
    </div>

    <!-- Joke Box -->
    <div class="joke-box">
        <span class="joke-emoji" id="jokeEmoji">😅</span>
        <div class="joke-text" id="jokeText">
            You got <span class="highlight">beaten</span> by your friend! 
            Time to hit the books! 📚
        </div>
    </div>

    <button class="btn-rematch" onclick="window.location.href='challenge-attempt.html'">
        🔄 Rematch
    </button>

    <button class="btn-home" onclick="window.location.href='index.html'">
        ← Back to Home
    </button>
</div>

<script>
    // Get challenge data from URL
    function getResultData() {
        const params = new URLSearchParams(window.location.search);
        return {
            challenger: params.get('challenger') || 'Rahul',
            yourScore: parseInt(params.get('yourScore')) || 82,
            friendScore: parseInt(params.get('friendScore')) || 71,
            topic: params.get('topic') || 'Jal-Jeevan-Mission'
        };
    }

    // Jokes based on result
    function getJoke(youWin, yourScore, friendScore) {
        if (youWin) {
            const jokes = [
                { emoji: '🏆', text: 'You absolutely <span class="highlight">destroyed</span> your friend! Time to celebrate! 🎉' },
                { emoji: '🔥', text: 'You <span class="highlight">crushed</span> it! Your friend is now questioning their life choices. 😂' },
                { emoji: '💪', text: 'You are the <span class="highlight">undisputed champion</span>! Your friend should retire from challenges. 🏅' },
                { emoji: '😎', text: 'You <span class="highlight">dominated</span>! Your friend just learned a valuable lesson. 📚' }
            ];
            return jokes[Math.floor(Math.random() * jokes.length)];
        } else if (yourScore === friendScore) {
            return { emoji: '🤝', text: 'It\'s a <span class="highlight">tie</span>! You and your friend are equally matched. Rematch? ⚔️' };
        } else {
            const jokes = [
                { emoji: '😅', text: 'You got <span class="highlight">beaten</span> by your friend! Time to hit the books! 📚' },
                { emoji: '😬', text: 'Ouch! Your friend <span class="highlight">outshone</span> you! Maybe don\'t share this result. 😂' },
                { emoji: '🤣', text: 'Your friend just <span class="highlight">humiliated</span> you! Better luck next time! 🏃' },
                { emoji: '😭', text: 'You <span class="highlight">lost</span> to your friend! Time to practice more! 💪' }
            ];
            return jokes[Math.floor(Math.random() * jokes.length)];
        }
    }

    function displayResults() {
        const data = getResultData();
        const youWin = data.yourScore > data.friendScore;
        const isTie = data.yourScore === data.friendScore;

        // Show scores
        document.getElementById('yourScore').textContent = data.yourScore + '%';
        document.getElementById('friendScore').textContent = data.friendScore + '%';
        document.getElementById('friendName').textContent = data.challenger;

        // Highlight winner
        if (youWin) {
            document.getElementById('youCard').classList.add('winner');
            document.getElementById('friendCard').classList.remove('winner');
            document.getElementById('friendTrophy').textContent = '';
        } else if (isTie) {
            document.getElementById('youCard').classList.remove('winner');
            document.getElementById('friendCard').classList.remove('winner');
            document.getElementById('friendTrophy').textContent = '';
        } else {
            document.getElementById('friendCard').classList.add('winner');
            document.getElementById('youCard').classList.remove('winner');
            document.getElementById('friendTrophy').textContent = '🏆';
        }

        // Show joke
        const joke = getJoke(youWin, data.yourScore, data.friendScore);
        document.getElementById('jokeEmoji').textContent = joke.emoji;
        document.getElementById('jokeText').innerHTML = joke.text;
    }

    displayResults();
</script>

</body>
</html>
