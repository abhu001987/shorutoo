<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Challenge - Shoruto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-0, #05060C);
            color: var(--text, #EAF0FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        :root {
            --bg-0: #05060C;
            --panel: rgba(255,255,255,0.045);
            --border: rgba(255,255,255,0.09);
            --blue: #3E7BFA;
            --blue-soft: rgba(62,123,250,0.35);
            --text: #EAF0FF;
            --text-dim: #8993B8;
            --text-dimmer: #5C6788;
            --input-bg: rgba(255,255,255,0.04);
            --mint: #34D399;
            --amber: #FFB84D;
        }
        [data-theme="light"] {
            --bg-0: #F0F4F8;
            --panel: rgba(255,255,255,0.7);
            --border: rgba(0,0,0,0.08);
            --blue: #5B7FFF;
            --blue-soft: rgba(91,127,255,0.12);
            --text: #0F172A;
            --text-dim: #475569;
            --text-dimmer: #94A3B8;
            --input-bg: rgba(0,0,0,0.04);
        }
        [data-theme="light"] body {
            background: linear-gradient(135deg, #D6E4FF 0%, #E8D5FF 40%, #D5F5E3 100%);
        }

        .accept-box {
            max-width: 480px;
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }

        .challenger-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .challenger-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5B7FFF, #A78BFA);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        .challenger-name {
            font-size: 18px;
            font-weight: 600;
        }
        .challenger-name span {
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 400;
        }

        .challenge-icon {
            font-size: 48px;
            margin-bottom: 8px;
            display: block;
        }

        .accept-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .accept-subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .challenger-score {
            background: var(--blue-soft);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .challenger-score .label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .challenger-score .score-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFB84D, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }
        .challenger-score .score-label {
            font-size: 14px;
            color: var(--text-dim);
        }
        .challenger-score .beat-text {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 8px;
        }
        .challenger-score .beat-text strong {
            color: var(--text);
        }

        .topic-box {
            background: var(--input-bg);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            text-align: left;
        }
        .topic-box .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dimmer);
            font-weight: 600;
        }
        .topic-box .topic-name {
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
            color: var(--text);
        }
        .topic-box .topic-tag {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            background: var(--blue-soft);
            color: var(--blue);
        }

        .btn-accept {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #34D399, #5B7FFF);
            color: #fff;
            box-shadow: 0 8px 24px rgba(52, 211, 153, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        .btn-accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(52, 211, 153, 0.5);
        }

        .btn-decline {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-dim);
            margin-top: 10px;
        }
        .btn-decline:hover {
            background: var(--input-bg);
            color: var(--text);
        }

        @media (max-width: 480px) {
            .accept-box { padding: 24px 16px; }
        }
    </style>
</head>
<body>

<div class="accept-box">
    <div class="challenger-info">
        <div class="challenger-avatar" id="challengerInitial">R</div>
        <div class="challenger-name">
            <span id="challengerName">Rahul</span> <span>challenged you!</span>
        </div>
    </div>

    <span class="challenge-icon">⚔️</span>
    <div class="accept-title">Can You Beat This Score?</div>
    <div class="accept-subtitle">Prove your knowledge and beat their score!</div>

    <div class="challenger-score">
        <div class="label">🎯 Score to Beat</div>
        <div class="score-number" id="challengerScore">82%</div>
        <div class="score-label">by <span id="challengerName2">Rahul</span></div>
        <div class="beat-text">💪 Can you beat <strong id="challengerName3">Rahul's</strong> score?</div>
    </div>

    <div class="topic-box">
        <div class="label">📚 Topic</div>
        <div class="topic-name" id="topicName">Jal Jeevan Mission</div>
        <span class="topic-tag" id="topicTag">Government Scheme</span>
    </div>

    <button class="btn-accept" onclick="acceptChallenge()">
        🎯 Accept Challenge
    </button>

    <button class="btn-decline" onclick="if(confirm('Are you sure you want to decline this challenge?')){alert('Challenge declined.')}">
        Maybe later
    </button>
</div>

<script>
    function getChallengeData() {
        const params = new URLSearchParams(window.location.search);
        return {
            challenger: params.get('challenger') || 'Rahul',
            score: params.get('score') || '82',
            topic: params.get('topic') || 'Jal-Jeevan-Mission'
        };
    }

    function displayChallenge() {
        const data = getChallengeData();
        document.getElementById('challengerName').textContent = data.challenger;
        document.getElementById('challengerName2').textContent = data.challenger;
        document.getElementById('challengerName3').textContent = data.challenger + "'s";
        document.getElementById('challengerScore').textContent = data.score + '%';
        document.getElementById('challengerInitial').textContent = data.challenger.charAt(0);
        const topicDisplay = data.topic.replace(/-/g, ' ');
        document.getElementById('topicName').textContent = topicDisplay;
    }

    function acceptChallenge() {
        const data = getChallengeData();
        window.location.href = `challenge-attempt.html?topic=${data.topic}&challenger=${data.challenger}&targetScore=${data.score}`;
    }

    displayChallenge();
</script>

</body>
</html>
