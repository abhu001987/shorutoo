<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Complete! - Shoruto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-0, #05060C);
            color: var(--text, #EAF0FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        :root {
            --bg-0: #05060C;
            --panel: rgba(255,255,255,0.045);
            --border: rgba(255,255,255,0.09);
            --blue: #3E7BFA;
            --blue-soft: rgba(62,123,250,0.35);
            --text: #EAF0FF;
            --text-dim: #8993B8;
            --text-dimmer: #5C6788;
            --input-bg: rgba(255,255,255,0.04);
            --mint: #34D399;
            --amber: #FFB84D;
        }
        [data-theme="light"] {
            --bg-0: #F0F4F8;
            --panel: rgba(255,255,255,0.7);
            --border: rgba(0,0,0,0.08);
            --blue: #5B7FFF;
            --blue-soft: rgba(91,127,255,0.12);
            --text: #0F172A;
            --text-dim: #475569;
            --text-dimmer: #94A3B8;
            --input-bg: rgba(0,0,0,0.04);
        }
        [data-theme="light"] body {
            background: linear-gradient(135deg, #D6E4FF 0%, #E8D5FF 40%, #D5F5E3 100%);
        }

        .result-box {
            max-width: 480px;
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }

        .result-emoji {
            font-size: 64px;
            margin-bottom: 8px;
            display: block;
        }

        .result-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #5B7FFF, #A78BFA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .result-subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .topic-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            background: var(--blue-soft);
            color: var(--blue);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: conic-gradient(var(--blue) 0% 82%, var(--border) 82% 100%);
            position: relative;
        }
        .score-circle::before {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            background: var(--bg-0);
        }
        .score-circle .number {
            position: relative;
            z-index: 1;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .score-circle .label {
            position: relative;
            z-index: 1;
            font-size: 12px;
            color: var(--text-dim);
        }

        .challenge-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #5B7FFF, #A78BFA);
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .challenge-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(91, 127, 255, 0.35);
        }
        .challenge-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0 20px;
            color: var(--text-dimmer);
            font-size: 12px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .share-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }
        .share-btn {
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
        }
        .share-btn:hover {
            background: var(--panel-strong);
            transform: translateY(-2px);
        }
        .share-btn .emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }

        .link-box {
            display: flex;
            gap: 10px;
            padding: 10px 14px;
            background: var(--input-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .link-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 12px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .link-box .copy-btn {
            padding: 4px 14px;
            border-radius: 6px;
            border: none;
            background: var(--blue);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .link-box .copy-btn:hover {
            background: #5B7FFF;
        }

        .status-msg {
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .status-msg.success {
            display: block;
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--mint);
        }
        .status-msg.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #F87171;
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-dim);
        }
        .back-btn:hover {
            background: var(--input-bg);
            color: var(--text);
        }

        @media (max-width: 480px) {
            .result-box { padding: 24px 16px; }
            .score-circle { width: 120px; height: 120px; }
            .score-circle .number { font-size: 34px; }
            .share-options { grid-template-columns: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="result-box">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-title" id="resultTitle">Challenge Complete!</div>
    <div class="result-subtitle" id="resultSubtitle">You scored on your challenge</div>

    <span class="topic-badge" id="topicBadge">📚 Loading...</span>

    <div class="score-circle">
        <span class="number" id="scoreNumber">--%</span>
        <span class="label">Your Score</span>
    </div>

    <button class="challenge-btn" id="challengeBtn">
        ⚔️ Challenge a Friend
    </button>

    <div class="divider">or share challenge link</div>

    <div class="link-box">
        <input type="text" id="challengeLink" value="https://www.shoruto.com/challenge/xyz789" readonly>
        <button class="copy-btn" id="copyBtn">Copy</button>
    </div>

    <div class="share-options">
        <button class="share-btn" onclick="shareResult('whatsapp')">
            <span class="emoji">💬</span>
            WhatsApp
        </button>
        <button class="share-btn" onclick="shareResult('instagram')">
            <span class="emoji">📸</span>
            Instagram
        </button>
        <button class="share-btn" onclick="shareResult('telegram')">
            <span class="emoji">✈️</span>
            Telegram
        </button>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <button class="back-btn" onclick="window.location.href='index.html'">
        ← Back to Home
    </button>
</div>

<script>
    // Get score from URL parameters - NO DEFAULTS!
    function getScoreData() {
        const params = new URLSearchParams(window.location.search);
        const score = params.get('score');
        const topic = params.get('topic') || 'Jal-Jeevan-Mission';
        const challenger = params.get('challenger') || 'You';
        
        return { score, topic, challenger };
    }

    function displayScore() {
        const data = getScoreData();
        const score = data.score;
        const topic = data.topic.replace(/-/g, ' ');
        
        // If no score in URL, show error
        if (!score) {
            document.getElementById('statusMsg').className = 'status-msg error';
            document.getElementById('statusMsg').textContent = '❌ No score found! Please take the test first.';
            document.getElementById('challengeBtn').disabled = true;
            document.getElementById('challengeBtn').style.opacity = '0.5';
            document.getElementById('challengeBtn').style.cursor = 'not-allowed';
            
            // Auto-redirect to test after 3 seconds
            setTimeout(() => {
                window.location.href = 'challenge-attempt.html';
            }, 3000);
            return;
        }
        
        // Update UI with REAL score
        document.getElementById('scoreNumber').textContent = score + '%';
        document.getElementById('resultSubtitle').textContent = `You scored ${score}% on ${topic}`;
        document.getElementById('topicBadge').textContent = `📚 ${topic}`;
        
        // Set emoji based on score
        const emoji = score >= 80 ? '🎉' : score >= 60 ? '💪' : '📚';
        document.getElementById('resultEmoji').textContent = emoji;
        
        // Build challenge link with REAL score
        const challenger = data.challenger || 'You';
        const challengeLink = `https://www.shoruto.com/accept-challenge.html?challenger=${encodeURIComponent(challenger)}&score=${score}&topic=${data.topic}`;
        document.getElementById('challengeLink').value = challengeLink;
    }

    // Share functions
    document.getElementById('challengeBtn').addEventListener('click', function() {
        const link = document.getElementById('challengeLink').value;
        navigator.clipboard.writeText(link).then(() => {
            const msg = document.getElementById('statusMsg');
            msg.className = 'status-msg success';
            msg.textContent = '🎯 Challenge link copied! Share with your friend.';
            setTimeout(() => { msg.className = 'status-msg'; }, 3000);
        });
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
        const input = document.getElementById('challengeLink');
        input.select();
        document.execCommand('copy');
        const msg = document.getElementById('statusMsg');
        msg.className = 'status-msg success';
        msg.textContent = '✅ Link copied to clipboard!';
        setTimeout(() => { msg.className = 'status-msg'; }, 3000);
    });

    function shareResult(platform) {
        const link = document.getElementById('challengeLink').value;
        const msg = document.getElementById('statusMsg');
        const messages = {
            whatsapp: `💬 Share via WhatsApp: ${link}`,
            instagram: `📸 Share via Instagram: ${link}`,
            telegram: `✈️ Share via Telegram: ${link}`
        };
        msg.className = 'status-msg success';
        msg.textContent = messages[platform] || '✅ Shared!';
        setTimeout(() => { msg.className = 'status-msg'; }, 3000);
    }

    // Load on page load
    displayScore();
</script>

</body>
</html>
