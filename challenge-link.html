<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Link - Shoruto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-0, #05060C);
            color: var(--text, #EAF0FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        :root {
            --bg-0: #05060C;
            --panel: rgba(255,255,255,0.045);
            --border: rgba(255,255,255,0.09);
            --blue: #3E7BFA;
            --blue-soft: rgba(62,123,250,0.35);
            --text: #EAF0FF;
            --text-dim: #8993B8;
            --text-dimmer: #5C6788;
            --input-bg: rgba(255,255,255,0.04);
            --mint: #34D399;
        }
        [data-theme="light"] {
            --bg-0: #F0F4F8;
            --panel: rgba(255,255,255,0.7);
            --border: rgba(0,0,0,0.08);
            --blue: #5B7FFF;
            --blue-soft: rgba(91,127,255,0.12);
            --text: #0F172A;
            --text-dim: #475569;
            --text-dimmer: #94A3B8;
            --input-bg: rgba(0,0,0,0.04);
        }
        [data-theme="light"] body {
            background: linear-gradient(135deg, #D6E4FF 0%, #E8D5FF 40%, #D5F5E3 100%);
        }

        .link-box {
            max-width: 480px;
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }

        .link-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .link-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .link-subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .link-display {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            word-break: break-all;
        }
        .link-display .link-url {
            font-size: 14px;
            color: var(--blue);
            font-weight: 500;
        }

        .btn-copy {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #5B7FFF, #A78BFA);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(91, 127, 255, 0.35);
        }

        .btn-home {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-dim);
        }
        .btn-home:hover {
            background: var(--input-bg);
            color: var(--text);
        }

        .status-msg {
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .status-msg.success {
            display: block;
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--mint);
        }

        @media (max-width: 480px) {
            .link-box { padding: 24px 16px; }
        }
    </style>
</head>
<body>

<div class="link-box">
    <span class="link-icon">🔗</span>
    <div class="link-title">Challenge Link</div>
    <div class="link-subtitle">Share this link with your friend to challenge them!</div>

    <div class="link-display">
        <div class="link-url" id="challengeLink">https://www.shoruto.com/challenge/xyz789</div>
    </div>

    <button class="btn-copy" id="copyBtn">
        📋 Copy Link
    </button>

    <div class="status-msg success" id="statusMsg">
        ✅ Link copied! Share with your friend.
    </div>

    <button class="btn-home" onclick="window.location.href='index.html'">
        ← Back to Home
    </button>
</div>

<script>
    // Get the full URL with parameters
    function getFullLink() {
        const params = new URLSearchParams(window.location.search);
        const challenger = params.get('challenger') || 'Rahul';
        const score = params.get('score') || '82';
        const topic = params.get('topic') || 'Jal-Jeevan-Mission';
        
        // Build the accept challenge link
        return `https://www.shoruto.com/accept-challenge.html?challenger=${challenger}&score=${score}&topic=${topic}`;
    }

    // Display the link
    document.getElementById('challengeLink').textContent = getFullLink();

    // Copy functionality
    document.getElementById('copyBtn').addEventListener('click', function() {
        const link = document.getElementById('challengeLink').textContent;
        navigator.clipboard.writeText(link).then(() => {
            const msg = document.getElementById('statusMsg');
            msg.className = 'status-msg success';
            msg.textContent = '✅ Link copied! Share with your friend.';
            setTimeout(() => { msg.className = 'status-msg'; }, 3000);
        });
    });
</script>

</body>
</html>
